services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kontora_pos_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Cloudflare Tunnel se ejecuta en la VM y consume este origen local.
      # No publicar Spring Boot directamente en Internet.
      - "127.0.0.1:${APP_PORT:-8080}:8080"
