services:
  postgres:
    image: postgres:16-alpine
    container_name: kontora_pos_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kontora_pos}
      POSTGRES_USER: ${POSTGRES_USER:-kontora_pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kontora_pos_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kontora_pos_postgres_data:/var/lib/postgresql/data
      - ../database/schema/kontora_pos_schema_v1_1.sql:/docker-entrypoint-initdb.d/001_kontora_pos_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles:
      - backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kontora_pos_backend_local
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  kontora_pos_postgres_data:

