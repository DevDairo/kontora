server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: kontora-pos-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kontora_pos}?sslmode=${DB_SSLMODE:disable}
    username: ${DB_USER:kontora_pos}
    password: ${DB_PASSWORD:kontora_pos_local_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

kontora:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  bootstrap:
    manager:
      enabled: ${BOOTSTRAP_MANAGER_ENABLED:false}
      username: ${BOOTSTRAP_MANAGER_USERNAME:}
      full-name: ${BOOTSTRAP_MANAGER_FULL_NAME:}
      password: ${BOOTSTRAP_MANAGER_PASSWORD:}
  storage:
    supabase:
      bucket: ${SUPABASE_STORAGE_BUCKET:evidencias}
      url: ${SUPABASE_URL:}
      service-role-key: ${SUPABASE_SECRET_KEY:${SUPABASE_SERVICE_ROLE_KEY:}}
